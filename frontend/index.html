<!DOCTYPE html>
<html lang="en">
  <head>

        }
      }
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              navy: {
                950: '#050810',
                900: '#0a1628',
                800: '#0d1530',
                700: '#111d40',
                600: '#172352',
              },
              'locka-cyan': '#00d4ff',
              'locka-blue': '#0066ff',
              'locka-purple': '#6600cc',
              brand: {
                blue: '#3b82f6',
                cyan: '#06b6d4',
                green: '#10b981',
                amber: '#f59e0b',
                red: '#ef4444',
              }
            },
            fontFamily: {
              sans: ['Inter', 'system-ui', 'sans-serif'],
              mono: ['JetBrains Mono', 'Fira Code', 'monospace'],
            },
            backdropBlur: {
              xs: '2px',
            },
            animation: {
              'fade-in': 'fadeIn 0.3s ease-out',
              'slide-up': 'slideUp 0.3s ease-out',
              'pulse-slow': 'pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite',
            },
            keyframes: {
              fadeIn: { '0%': { opacity: '0' }, '100%': { opacity: '1' } },
              slideUp: { '0%': { opacity: '0', transform: 'translateY(12px)' }, '100%': { opacity: '1', transform: 'translateY(0)' } },
            }
          }
        }
      }
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
    <style>
      * { box-sizing: border-box; }
      html, body, #root {
        margin: 0; padding: 0;
        min-height: 100vh;
        background-color: #0a1628;
        color: #e2e8f0;
        font-family: 'Inter', system-ui, sans-serif;
      }
      ::-webkit-scrollbar { width: 6px; height: 6px; }
      ::-webkit-scrollbar-track { background: #0d1530; }
      ::-webkit-scrollbar-thumb { background: #1e3a5f; border-radius: 3px; }
      ::-webkit-scrollbar-thumb:hover { background: #3b82f6; }

      .glass {
        background: rgba(13, 21, 48, 0.7);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border: 1px solid rgba(59, 130, 246, 0.15);
      }
      .glass-bright {
        background: rgba(17, 29, 64, 0.85);
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
        border: 1px solid rgba(59, 130, 246, 0.25);
      }
      .glow-blue { box-shadow: 0 0 20px rgba(59, 130, 246, 0.15); }
      .glow-cyan { box-shadow: 0 0 20px rgba(6, 182, 212, 0.15); }
      .glow-green { box-shadow: 0 0 20px rgba(16, 185, 129, 0.15); }

      .btn-primary {
        background: linear-gradient(135deg, #3b82f6, #2563eb);
        color: white;
        border: none;
        cursor: pointer;
        transition: all 0.2s;
        font-weight: 600;
      }
      .btn-primary:hover:not(:disabled) {
        background: linear-gradient(135deg, #60a5fa, #3b82f6);
        box-shadow: 0 4px 20px rgba(59, 130, 246, 0.4);
        transform: translateY(-1px);
      }
      .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

      .btn-secondary {
        background: rgba(59, 130, 246, 0.1);
        color: #60a5fa;
        border: 1px solid rgba(59, 130, 246, 0.3);
        cursor: pointer;
        transition: all 0.2s;
        font-weight: 500;
      }
      .btn-secondary:hover:not(:disabled) {
        background: rgba(59, 130, 246, 0.2);
        border-color: rgba(59, 130, 246, 0.5);
      }
      .btn-secondary:disabled { opacity: 0.5; cursor: not-allowed; }

      .btn-success {
        background: linear-gradient(135deg, #10b981, #059669);
        color: white; border: none; cursor: pointer; transition: all 0.2s; font-weight: 600;
      }
      .btn-success:hover:not(:disabled) { box-shadow: 0 4px 20px rgba(16,185,129,0.4); transform: translateY(-1px); }
      .btn-success:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

      .btn-danger {
        background: linear-gradient(135deg, #ef4444, #dc2626);
        color: white; border: none; cursor: pointer; transition: all 0.2s; font-weight: 600;
      }
      .btn-danger:hover:not(:disabled) { box-shadow: 0 4px 20px rgba(239,68,68,0.4); transform: translateY(-1px); }
      .btn-danger:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

      .btn-amber {
        background: linear-gradient(135deg, #f59e0b, #d97706);
        color: white; border: none; cursor: pointer; transition: all 0.2s; font-weight: 600;
      }
      .btn-amber:hover:not(:disabled) { box-shadow: 0 4px 20px rgba(245,158,11,0.4); transform: translateY(-1px); }
      .btn-amber:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

      .input-field {
        background: rgba(5, 8, 16, 0.6);
        border: 1px solid rgba(59, 130, 246, 0.2);
        color: #e2e8f0;
        border-radius: 8px;
        padding: 10px 14px;
        width: 100%;
        transition: all 0.2s;
        font-size: 14px;
      }
      .input-field:focus {
        outline: none;
        border-color: rgba(59, 130, 246, 0.6);
        box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        background: rgba(5, 8, 16, 0.8);
      }
      .input-field::placeholder { color: #4b5563; }
      select.input-field option { background: #0d1530; color: #e2e8f0; }

      .badge {
        display: inline-flex; align-items: center; gap: 4px;
        padding: 3px 10px; border-radius: 20px;
        font-size: 11px; font-weight: 600; letter-spacing: 0.05em; text-transform: uppercase;
      }
      .badge-green { background: rgba(16,185,129,0.15); color: #34d399; border: 1px solid rgba(16,185,129,0.3); }
      .badge-amber { background: rgba(245,158,11,0.15); color: #fbbf24; border: 1px solid rgba(245,158,11,0.3); }
      .badge-red { background: rgba(239,68,68,0.15); color: #f87171; border: 1px solid rgba(239,68,68,0.3); }
      .badge-blue { background: rgba(59,130,246,0.15); color: #60a5fa; border: 1px solid rgba(59,130,246,0.3); }
      .badge-cyan { background: rgba(6,182,212,0.15); color: #22d3ee; border: 1px solid rgba(6,182,212,0.3); }
      .badge-gray { background: rgba(107,114,128,0.15); color: #9ca3af; border: 1px solid rgba(107,114,128,0.3); }

      .nav-link {
        color: #94a3b8; padding: 8px 14px; border-radius: 8px;
        cursor: pointer; transition: all 0.2s; font-size: 14px; font-weight: 500;
        border: 1px solid transparent;
        background: none;
        white-space: nowrap;
      }
      .nav-link:hover { color: #e2e8f0; background: rgba(59,130,246,0.1); border-color: rgba(59,130,246,0.2); }
      .nav-link.active { color: #60a5fa; background: rgba(59,130,246,0.15); border-color: rgba(59,130,246,0.3); }

      .stat-card {
        background: rgba(13,21,48,0.7);
        border: 1px solid rgba(59,130,246,0.15);
        border-radius: 12px;
        padding: 20px;
        transition: all 0.2s;
      }
      .stat-card:hover { border-color: rgba(59,130,246,0.3); transform: translateY(-2px); }

      .record-row {
        border-bottom: 1px solid rgba(59,130,246,0.08);
        transition: background 0.15s;
      }
      .record-row:last-child { border-bottom: none; }
      .record-row:hover { background: rgba(59,130,246,0.05); }

      .section-header {
        font-size: 11px; font-weight: 700; letter-spacing: 0.1em;
        text-transform: uppercase; color: #475569; margin-bottom: 16px;
        display: flex; align-items: center; gap: 8px;
      }
      .section-header::after {
        content: ''; flex: 1; height: 1px;
        background: linear-gradient(90deg, rgba(59,130,246,0.2), transparent);
      }

      .tab-btn {
        padding: 8px 18px; border-radius: 8px; font-size: 13px; font-weight: 500;
        cursor: pointer; transition: all 0.2s; border: 1px solid transparent;
        background: none; color: #64748b;
      }
      .tab-btn:hover { color: #94a3b8; background: rgba(59,130,246,0.05); }
      .tab-btn.active { color: #60a5fa; background: rgba(59,130,246,0.15); border-color: rgba(59,130,246,0.3); }

      @keyframes spin { to { transform: rotate(360deg); } }
      .spinner {
        width: 18px; height: 18px; border: 2px solid rgba(255,255,255,0.2);
        border-top-color: white; border-radius: 50%;
        animation: spin 0.7s linear infinite; display: inline-block;
      }

      .mono { font-family: 'JetBrains Mono', monospace; }

      .gradient-text {
        background: linear-gradient(135deg, #3b82f6, #06b6d4);
        -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        background-clip: text;
      }

      .pulse-dot {
        width: 8px; height: 8px; border-radius: 50%;
        animation: pulse 2s ease-in-out infinite;
      }

      .tooltip {
        position: relative;
      }
      .tooltip:hover::after {
        content: attr(data-tip);
        position: absolute; bottom: 100%; left: 50%; transform: translateX(-50%);
        background: #0d1530; color: #e2e8f0; font-size: 11px;
        padding: 4px 8px; border-radius: 4px; white-space: nowrap;
        border: 1px solid rgba(59,130,246,0.2); z-index: 100;
        margin-bottom: 4px;
      }
    </style>
    <script>
      window.__QUICK_DAPP_CONFIG__ = window.__QUICK_DAPP_CONFIG__ || {

      };

  </head>

</html>
